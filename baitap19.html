<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Matching Game</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            margin: 0;
        }

        header {
            padding: 20px;
        }

        h1 {
            margin-bottom: 10px;
        }

        #moves {
            font-size: 18px;
        }

        button {
            padding: 10px 20px;
            margin-top: 10px;
            border: none;
            border-radius: 8px;
            background: #ff9800;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #e68900;
        }

        main {
            display: grid;
            gap: 15px;
            padding: 20px;
            justify-content: center;
        }

        /* Desktop: 4 cột */
        @media(min-width: 768px){
            main {
                grid-template-columns: repeat(4, 100px);
            }
        }

        /* Mobile: 2 cột */
        @media(max-width: 767px){
            main {
                grid-template-columns: repeat(2, 100px);
            }
        }

        .card {
            width: 100px;
            height: 100px;
            perspective: 1000px;
        }

        .inner {
            width: 100%;
            height: 100%;
            position: relative;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            cursor: pointer;
        }

        .card.flip .inner {
            transform: rotateY(180deg);
        }

        .front, .back {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            backface-visibility: hidden;
        }

        .front {
            background: white;
            color: black;
            transform: rotateY(180deg);
        }

        .back {
            background: #333;
        }

        .card:hover {
            transform: scale(1.05);
        }

        footer {
            margin-top: 20px;
        }
    </style>
</head>

<body>

<header>
    <h1>🎮 Memory Card Flip Game </h1>
    <p id="moves">Số lượt: 0</p>
    <button onclick="resetGame()">🔄 Chơi lại</button>
</header>

<main id="gameBoard"></main>

<footer>
    <p id="result"></p>
</footer>

<script>
    const icons = ["🍎","🍌","🍇","🍉"];
    let cards = [...icons, ...icons];

    let firstCard = null;
    let secondCard = null;
    let lockBoard = false;
    let moves = 0;
    let matched = 0;

    const board = document.getElementById("gameBoard");
    const moveText = document.getElementById("moves");
    const resultText = document.getElementById("result");

    function shuffle(array) {
        return array.sort(() => Math.random() - 0.5);
    }

    function createBoard() {
        board.innerHTML = "";
        shuffle(cards);

        cards.forEach(icon => {
            const card = document.createElement("div");
            card.classList.add("card");

            card.innerHTML = `
                <div class="inner">
                    <div class="front">${icon}</div>
                    <div class="back">❓</div>
                </div>
            `;

            card.addEventListener("click", () => flipCard(card, icon));
            board.appendChild(card);
        });
    }

    function flipCard(card, icon) {
        if (lockBoard || card.classList.contains("flip")) return;

        card.classList.add("flip");

        if (!firstCard) {
            firstCard = { card, icon };
            return;
        }

        secondCard = { card, icon };
        moves++;
        moveText.innerText = "Số lượt: " + moves;

        checkMatch();
    }

    function checkMatch() {
        if (firstCard.icon === secondCard.icon) {
            matched++;
            resetTurn();

            if (matched === 4) {
                resultText.innerText = "🎉 Bạn đã thắng!";
            }
        } else {
            lockBoard = true;

            setTimeout(() => {
                firstCard.card.classList.remove("flip");
                secondCard.card.classList.remove("flip");
                resetTurn();
            }, 800);
        }
    }

    function resetTurn() {
        [firstCard, secondCard] = [null, null];
        lockBoard = false;
    }

    function resetGame() {
        moves = 0;
        matched = 0;
        moveText.innerText = "Số lượt: 0";
        resultText.innerText = "";
        createBoard();
    }

    createBoard();
</script>

</body>
</html>
