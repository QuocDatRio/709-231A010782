<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bài tập 03 - Countdown</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  background: linear-gradient(135deg, #dfe9f3, #ffffff);
  text-align: center;
}

.timer-box {
  margin-top: 100px;
}

#time {
  font-size: 70px;
  font-weight: bold;
  color: #333;
}

.warning {
  color: red;
  animation: blink 1s infinite;
}

@keyframes blink {
  50% { opacity: 0; }
}

.btn-back {
  margin-top: 20px;
}
</style>

</head>

<body>

<div class="timer-box">
  <h2>⏳ Đếm ngược 10 phút</h2>
  <div id="time">10:00</div>

  <button onclick="history.back()" class="btn btn-secondary btn-back">
    ⬅ Quay lại
  </button>
</div>

<script>
let time = 600; 
const timeEl = document.getElementById("time");

let interval = setInterval(() => {

  let minutes = Math.floor(time / 60);
  let seconds = time % 60;

  timeEl.innerText = 
    `${minutes}:${seconds < 10 ? "0" : ""}${seconds}`;

  // cảnh báo dưới 1 phút
  if (time <= 60) {
    timeEl.classList.add("warning");
  }

  // hết giờ
  if (time <= 0) {
    clearInterval(interval); // tránh memory leak
    alert("⏰ Hết giờ!");
  }

  time--;

}, 1000);
</script>

</body>
</html>
