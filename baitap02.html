<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bài tập 02 - Form đăng ký</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  background: linear-gradient(135deg, #dfe9f3, #ffffff);
}

.form-box {
  max-width: 400px;
  margin: 60px auto;
  background: white;
  padding: 25px;
  border-radius: 15px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.2);
}

.error {
  color: red;
}

.success {
  color: green;
}
.btn-back {
  border-radius: 10px;
  transition: 0.3s;
  
}

.btn-back:hover {
  transform: translateX(-5px);
  
}
</style>

</head>

<body>

<div class="form-box">

<h3 class="text-center mb-3">Đăng ký tài khoản</h3>

<form id="form">

  <input id="name" class="form-control mb-2" placeholder="Họ tên">

  <input id="email" class="form-control mb-2" placeholder="Email">

  <input id="password" type="password" class="form-control mb-2" placeholder="Mật khẩu">

  <div class="form-check mb-2">
    <input type="checkbox" id="agree" class="form-check-input">
    <label class="form-check-label">Đồng ý điều khoản</label>
  </div>

  <button class="btn btn-primary w-100">Đăng ký</button>
<button onclick="history.back()" class="btn btn-secondary btn-back mt-2 w-100">
  ⬅ Quay lại
</button>
</form>

<p id="msg" class="mt-2 text-center"></p>

</div>

<script>
const form = document.getElementById("form");

if (form) {
  form.addEventListener("submit", function (e) {
    e.preventDefault();

    let name = document.getElementById("name").value.trim();
    let email = document.getElementById("email").value.trim();
    let pass = document.getElementById("password").value.trim();
    let agree = document.getElementById("agree").checked;

    let msg = document.getElementById("msg");

    let emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    let passRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{8,}$/;

    if (!name || !email || !pass) {
      msg.innerText = "Vui lòng nhập đầy đủ";
      return;
    }

    if (!emailRegex.test(email)) {
      msg.innerText = "Email sai";
      return;
    }

    if (!passRegex.test(pass)) {
      msg.innerText = "Mật khẩu yếu";
      return;
    }

    if (!agree) {
      msg.innerText = "Chưa đồng ý điều khoản";
      return;
    }

    localStorage.setItem("user", JSON.stringify({ name, email }));

    msg.innerText = "Đăng ký thành công!";
    msg.style.color = "green";

    showToast("🎉 Đăng ký thành công!");

    form.reset();
  });
}
</script>

</body>
</html>
