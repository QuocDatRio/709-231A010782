<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bài tập 01 - Sản phẩm</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<style>
  .product-img {
  width: 100%;
  height: 200px;
  object-fit: cover;
  border-radius: 10px;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark navbar-expand-lg">
  <div class="container">
    <a class="navbar-brand">🛒 Bán điện thoại</a>
    <a href="index.html" class="btn btn-light btn-sm">Trang chủ</a>
  </div>
</nav>

<div class="container mt-4">

  <h2 class="text-center mb-4">Danh sách sản phẩm</h2>

  <!-- SEARCH -->
  <input id="search" class="form-control mb-4" placeholder="🔍 Tìm sản phẩm...">

  <div id="products" class="row"></div>
  <p id="error" class="text-danger text-center"></p>

</div>

<!-- CART BUTTON -->
<div class="position-fixed bottom-0 end-0 m-4">
  <button class="btn btn-primary" onclick="viewCart()">
    🛒 Giỏ hàng (<span id="cartCount">0</span>)
  </button>
</div>

<!-- JS -->
<script>
  
const products = [
 {
  name:"iPhone 17 Promax ",
  price:36860,
  img:"images/dt1.jpg"
 },
 {
  name:"Samsung S26 Ultra",
  price:30990,
  img:"images/dt2.jpg"
 },
 {
  name:"Oppo Reno 13 5G ",
  price:7100,
  img:"images/dt3.jpg"
 },
 {
  name:"Xiaomi 17 Promax",
  price:26900,
  img:"images/dt4.jpg"
 },
 {
  name:"Nokia NOKIA 2.4",
  price:6000,
  img:"images/dt5.jpg"
 }
];

let cart = JSON.parse(localStorage.getItem("cart")) || [];

function renderProducts(list) {
  const container = document.getElementById("products");
  if (!container) return;

  container.innerHTML = "";

  list.forEach((p, index) => {
    container.innerHTML += `
      <div class="col-md-4">
        <div class="card p-3 mb-3">
          <img src="${p.img}" class="product-img mb-2">
          <h5>${p.name}</h5>
          <p>${(p.price * 1000).toLocaleString('vi-VN')} VND</p>
          <button class="btn btn-success" onclick="addToCart(${index})">
            Thêm vào giỏ
          </button>
        </div>
      </div>
    `;
  });
}

function addToCart(index) {
  cart.push(products[index]);
  localStorage.setItem("cart", JSON.stringify(cart));
  showToast("🛒 Đã thêm vào giỏ hàng!");
}

/* SEARCH + HISTORY */
const searchInput = document.getElementById("search");

if (searchInput) {
  renderProducts(products);

  searchInput.addEventListener("input", function () {
    let value = this.value.toLowerCase().trim();

    value = value.replace(/[^a-z0-9\s]/gi, "");

    const result = products.filter(p =>
      p.name.toLowerCase().includes(value)
    );

    localStorage.setItem("searchHistory", value);

    renderProducts(result);

    if (result.length === 0) {
      document.getElementById("error").innerText = "Không tìm thấy";
    } else {
      document.getElementById("error").innerText = "";
    }
  });

  // load lại search cũ
  let old = localStorage.getItem("searchHistory");
  if (old) {
    searchInput.value = old;
  }
}
</script>

</body>
</html>
